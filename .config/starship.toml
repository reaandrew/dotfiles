# Starship prompt configuration - Powerline style
# https://starship.rs/config/

# Timeout for commands that take too long
command_timeout = 1000

# Format with powerline-style arrows
format = """
[](fg:#3B4252)\
$os\
$username\
[](bg:#4C566A fg:#3B4252)\
$directory\
[](fg:#4C566A bg:#86BBD8)\
$git_branch\
$git_status\
[](fg:#86BBD8 bg:#33658A)\
$nodejs\
$python\
$golang\
$rust\
$docker_context\
[](fg:#33658A bg:#06969A)\
$time\
[ ](fg:#06969A)\
$line_break\
$character"""

# Disable blank line at start of prompt
add_newline = true

# OS icon
[os]
disabled = false
style = "bg:#3B4252 fg:#D8DEE9"
format = "[ $symbol ]($style)"

[os.symbols]
Ubuntu = ""
Debian = ""
Linux = ""
Macos = ""
Windows = ""

# Username
[username]
show_always = true
style_user = "bg:#3B4252 fg:#D8DEE9"
style_root = "bg:#3B4252 fg:#BF616A"
format = '[$user ]($style)'
disabled = false

# Directory
[directory]
style = "bg:#4C566A fg:#E5E9F0"
format = "[ $path ]($style)"
truncation_length = 3
truncation_symbol = "…/"

[directory.substitutions]
"Documents" = "󰈙 "
"Downloads" = " "
"Music" = " "
"Pictures" = " "
"repos" = " "

# Git branch
[git_branch]
symbol = ""
style = "bg:#86BBD8 fg:#2E3440"
format = '[ $symbol $branch ]($style)'

# Git status
[git_status]
style = "bg:#86BBD8 fg:#2E3440"
format = '[$all_status$ahead_behind ]($style)'
conflicted = "="
ahead = "⇡${count}"
behind = "⇣${count}"
diverged = "⇕⇡${ahead_count}⇣${behind_count}"
untracked = "?${count}"
stashed = "\\$"
modified = "!${count}"
staged = "+${count}"
renamed = "»${count}"
deleted = "✘${count}"

# Node.js
[nodejs]
symbol = ""
style = "bg:#33658A fg:#E5E9F0"
format = '[ $symbol ($version) ]($style)'

# Python
[python]
symbol = ""
style = "bg:#33658A fg:#E5E9F0"
format = '[ ${symbol}${pyenv_prefix}(${version})(\($virtualenv\)) ]($style)'

# Go
[golang]
symbol = ""
style = "bg:#33658A fg:#E5E9F0"
format = '[ $symbol ($version) ]($style)'

# Rust
[rust]
symbol = ""
style = "bg:#33658A fg:#E5E9F0"
format = '[ $symbol ($version) ]($style)'

# Docker
[docker_context]
symbol = ""
style = "bg:#33658A fg:#E5E9F0"
format = '[ $symbol $context ]($style)'

# Time
[time]
disabled = false
time_format = "%R"
style = "bg:#06969A fg:#E5E9F0"
format = '[  $time ]($style)'

# Prompt character
[character]
success_symbol = "[❯](bold #A3BE8C)"
error_symbol = "[❯](bold #BF616A)"
vimcmd_symbol = "[❮](bold #A3BE8C)"

# Command duration
[cmd_duration]
min_time = 2_000
format = "took [$duration](bold yellow)"
