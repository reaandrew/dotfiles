# ══════════════════════════════════════════════════════════════════════════════
#  TMUX Configuration - Slick Developer Setup
# ══════════════════════════════════════════════════════════════════════════════

# ─────────────────────────────────────────────────────────────────────────────
#  General Settings
# ─────────────────────────────────────────────────────────────────────────────

# Enable true color support
set -g default-terminal "tmux-256color"
set -ag terminal-overrides ",xterm-256color:RGB"

# Enable mouse support
set -g mouse on

# Start windows and panes at 1, not 0
set -g base-index 1
setw -g pane-base-index 1

# Renumber windows when one is closed
set -g renumber-windows on

# Increase scrollback buffer
set -g history-limit 50000

# Faster command sequences (no delay for escape)
set -sg escape-time 0

# Increase repeat timeout
set -g repeat-time 500

# Focus events enabled for terminals that support them
set -g focus-events on

# Activity monitoring
setw -g monitor-activity on
set -g visual-activity off

# ─────────────────────────────────────────────────────────────────────────────
#  Key Bindings
# ─────────────────────────────────────────────────────────────────────────────

# Change prefix to Ctrl-a (more ergonomic)
unbind C-b
set -g prefix C-a
bind C-a send-prefix

# Reload config
bind r source-file ~/.tmux.conf \; display "Config reloaded!"

# Split panes with | and - (more intuitive)
bind | split-window -h -c "#{pane_current_path}"
bind - split-window -v -c "#{pane_current_path}"
unbind '"'
unbind %

# Navigate panes with vim keys
bind h select-pane -L
bind j select-pane -D
bind k select-pane -U
bind l select-pane -R

# Resize panes with vim keys
bind -r H resize-pane -L 5
bind -r J resize-pane -D 5
bind -r K resize-pane -U 5
bind -r L resize-pane -R 5

# Quick pane cycling
bind -r Tab select-pane -t :.+

# New window in current path
bind c new-window -c "#{pane_current_path}"

# Quick window navigation
bind -r C-h select-window -t :-
bind -r C-l select-window -t :+

# Kill pane without confirmation
bind x kill-pane

# Kill window without confirmation
bind X kill-window

# Synchronize panes toggle
bind S setw synchronize-panes

# Copy mode with vim keys
setw -g mode-keys vi
bind -T copy-mode-vi v send -X begin-selection
bind -T copy-mode-vi y send -X copy-selection-and-cancel
bind -T copy-mode-vi Escape send -X cancel

# ─────────────────────────────────────────────────────────────────────────────
#  Status Bar - Powerline Style
# ─────────────────────────────────────────────────────────────────────────────

# Enable status bar
set -g status on
set -g status-interval 5
set -g status-position bottom

# Status bar colors (Nord theme inspired)
set -g status-style "bg=#3B4252,fg=#D8DEE9"

# Status bar length
set -g status-left-length 100
set -g status-right-length 100

# Left status - session name with powerline arrow
set -g status-left "#[fg=#2E3440,bg=#81A1C1,bold]  #S #[fg=#81A1C1,bg=#4C566A]#[fg=#D8DEE9,bg=#4C566A] #I:#W #[fg=#4C566A,bg=#3B4252]"

# Right status - hostname, date, time with powerline arrows
set -g status-right "#[fg=#4C566A,bg=#3B4252]#[fg=#D8DEE9,bg=#4C566A]  #H #[fg=#5E81AC,bg=#4C566A]#[fg=#2E3440,bg=#5E81AC]  %Y-%m-%d #[fg=#81A1C1,bg=#5E81AC]#[fg=#2E3440,bg=#81A1C1,bold]  %H:%M "

# Window status
set -g status-justify left

# Inactive windows
setw -g window-status-format "#[fg=#3B4252,bg=#4C566A]#[fg=#D8DEE9,bg=#4C566A] #I #W #[fg=#4C566A,bg=#3B4252]"

# Active window
setw -g window-status-current-format "#[fg=#3B4252,bg=#88C0D0]#[fg=#2E3440,bg=#88C0D0,bold] #I #W #[fg=#88C0D0,bg=#3B4252]"

# Window separator
setw -g window-status-separator ""

# ─────────────────────────────────────────────────────────────────────────────
#  Pane Styling
# ─────────────────────────────────────────────────────────────────────────────

# Pane borders
set -g pane-border-style "fg=#4C566A"
set -g pane-active-border-style "fg=#88C0D0"

# Pane number display
set -g display-panes-time 2000
set -g display-panes-colour "#4C566A"
set -g display-panes-active-colour "#88C0D0"

# ─────────────────────────────────────────────────────────────────────────────
#  Message Styling
# ─────────────────────────────────────────────────────────────────────────────

set -g message-style "fg=#2E3440,bg=#EBCB8B,bold"
set -g message-command-style "fg=#2E3440,bg=#EBCB8B"

# ─────────────────────────────────────────────────────────────────────────────
#  Clock Mode
# ─────────────────────────────────────────────────────────────────────────────

setw -g clock-mode-colour "#88C0D0"
setw -g clock-mode-style 24
